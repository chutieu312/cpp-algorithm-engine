openapi: "3.0.3"

info:
  title: Algorithm Validation Engine
  description: |
    C++ REST API exposing a discrete 1D Kalman filter and OLS linear regression.

    Built as an interview practice project targeting Northrop Grumman C++ engineering roles.
    Demonstrates implementing mathematical algorithm requirements (MARs) in C++17,
    persisting results to SQLite, and exposing them through a REST interface.

    ## Kalman filter equations (predict / update)
    **Predict:** `P_pred = P + Q`

    **Update:** `K = P_pred / (P_pred + R)`, `x = x_pred + K*(z - x_pred)`, `P = (1-K)*P_pred`
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Local development (Docker or native build)

tags:
  - name: health
    description: Service liveness
  - name: algorithms
    description: Algorithm execution endpoints
  - name: history
    description: Computation run history

paths:

  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                service: algorithm-validation-engine

  /api/algorithms:
    get:
      tags: [algorithms]
      summary: List available algorithms
      operationId: listAlgorithms
      responses:
        "200":
          description: Array of available algorithm descriptors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlgorithmListResponse"

  /api/kalman/run:
    post:
      tags: [algorithms]
      summary: Run discrete 1D Kalman filter
      operationId: runKalman
      description: |
        Accepts an initial state, covariance parameters, and a sequence of scalar
        measurements. Returns the state estimate, covariance, and Kalman gain after
        each predict → update cycle.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KalmanRequest"
            examples:
              simple:
                summary: Basic tracking example
                value:
                  x0: 0.0
                  p0: 1.0
                  q: 0.1
                  r: 1.0
                  measurements: [1.2, 2.1, 3.0, 3.8, 5.1]
      responses:
        "200":
          description: State estimates at each measurement step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KalmanResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/leastsq/run:
    post:
      tags: [algorithms]
      summary: Run ordinary least squares linear regression
      operationId: runLeastsq
      description: |
        Fits y = slope * x + intercept to the provided (x, y) data points using
        the closed-form normal equations. Returns slope, intercept, R², and
        predicted y for each input x.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LsqRequest"
            examples:
              perfect_line:
                summary: Perfect y = 2x + 1
                value:
                  points:
                    - {x: 1, y: 3}
                    - {x: 2, y: 5}
                    - {x: 3, y: 7}
                    - {x: 4, y: 9}
      responses:
        "200":
          description: Regression coefficients and predictions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LsqResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/runs:
    get:
      tags: [history]
      summary: Get computation history (last 100 runs)
      operationId: getRuns
      responses:
        "200":
          description: Most recent computation runs ordered by id DESC
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComputationRun"

components:

  schemas:

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: algorithm-validation-engine

    AlgorithmListResponse:
      type: object
      properties:
        algorithms:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              endpoint:
                type: string
              description:
                type: string

    KalmanRequest:
      type: object
      required: [x0, p0, q, r, measurements]
      properties:
        x0:
          type: number
          description: Initial state estimate
        p0:
          type: number
          description: Initial state covariance (must be > 0)
        q:
          type: number
          description: Process noise covariance (must be >= 0)
        r:
          type: number
          description: Measurement noise covariance (must be > 0)
        measurements:
          type: array
          items:
            type: number
          minItems: 1
          maxItems: 1000
          description: Sequence of scalar measurements z

    KalmanResponse:
      type: object
      properties:
        final_state:
          type: number
          description: State estimate after the last update
        states:
          type: array
          items:
            type: object
            properties:
              state:
                type: number
              covariance:
                type: number
              kalman_gain:
                type: number

    LsqRequest:
      type: object
      required: [points]
      properties:
        points:
          type: array
          minItems: 2
          maxItems: 10000
          items:
            type: object
            required: [x, y]
            properties:
              x:
                type: number
              y:
                type: number

    LsqResponse:
      type: object
      properties:
        slope:
          type: number
        intercept:
          type: number
        r_squared:
          type: number
          description: Coefficient of determination (0..1)
        predictions:
          type: array
          items:
            type: object
            properties:
              x:
                type: number
              y_predicted:
                type: number

    ComputationRun:
      type: object
      properties:
        id:
          type: integer
        algorithm:
          type: string
          enum: [kalman, leastsq]
        input_json:
          type: object
        output_json:
          type: object
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

  responses:
    BadRequest:
      description: Invalid or malformed request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Mathematically degenerate input (e.g. all-identical x values)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
