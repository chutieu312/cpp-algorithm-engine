services:

  # ── C++ REST API ──────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - db-data:/data
    environment:
      PORT:       "8080"
      DB_PATH:    /data/ave.db
      PUBLIC_DIR: /app/public
    restart: unless-stopped
    healthcheck:
      test:         ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval:     30s
      timeout:      5s
      retries:      3
      start_period: 20s

  # ── Swagger UI (API explorer) ─────────────────────────────────────────────
  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8090:8080"
    environment:
      URL:  "http://localhost:8080/openapi.yaml"
      CORS: "true"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Adminer (SQLite database browser) ─────────────────────────────────────
  adminer:
    image: adminer:4
    ports:
      - "8889:8080"
    volumes:
      - db-data:/data
    restart: unless-stopped
    depends_on:
      - api

volumes:
  db-data:
